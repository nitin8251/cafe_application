name: Firebase Secrets Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/firebase-integration
  pull_request:

jobs:
  validate-firebase-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Streamlit secrets from GitHub Secrets
        shell: bash
        run: |
          mkdir -p .streamlit
          cat > .streamlit/secrets.toml <<EOF
          [firebase]
          type = "service_account"
          project_id = "${{ secrets.FIREBASE_PROJECT_ID }}"
          private_key_id = "${{ secrets.FIREBASE_PRIVATE_KEY_ID }}"
          private_key = """${{ secrets.FIREBASE_PRIVATE_KEY }}"""
          client_email = "${{ secrets.FIREBASE_CLIENT_EMAIL }}"
          client_id = "${{ secrets.FIREBASE_CLIENT_ID }}"
          auth_uri = "${{ secrets.FIREBASE_AUTH_URI }}"
          token_uri = "${{ secrets.FIREBASE_TOKEN_URI }}"
          auth_provider_x509_cert_url = "${{ secrets.FIREBASE_AUTH_PROVIDER_CERT_URL }}"
          client_x509_cert_url = "${{ secrets.FIREBASE_CLIENT_CERT_URL }}"
          EOF

      - name: Validate secrets file structure
        shell: bash
        run: |
          python - <<'PY'
          import sys
          import tomllib
          from pathlib import Path

          path = Path(".streamlit/secrets.toml")
          data = tomllib.loads(path.read_text(encoding="utf-8"))
          firebase = data.get("firebase", {})

          required = [
              "type",
              "project_id",
              "private_key_id",
              "private_key",
              "client_email",
              "client_id",
              "auth_uri",
              "token_uri",
              "auth_provider_x509_cert_url",
              "client_x509_cert_url",
          ]

          missing = [key for key in required if not firebase.get(key)]
          if missing:
              print("Missing Firebase GitHub secrets:", ", ".join(missing))
              sys.exit(1)

          if "BEGIN PRIVATE KEY" not in firebase["private_key"]:
              print("FIREBASE_PRIVATE_KEY does not look like a service account private key.")
              sys.exit(1)

          print("Firebase secrets file looks valid.")
          PY
